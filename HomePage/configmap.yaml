apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="pl">
    <head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>

    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0f172a;
      color:white;
    }

    .header {
      padding:30px;
      font-size:32px;
      text-align:center;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap:25px;
      padding:40px;
      max-width:900px;
      margin:auto;
    }

    .card {
      background:#1e293b;
      padding:30px;
      border-radius:15px;
      text-decoration:none;
      color:white;
      font-size:22px;
      text-align:center;
      transition:0.3s;
      box-shadow:0 10px 20px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: translateY(-5px);
      background:#334155;
    }

    .icon {
      font-size:40px;
      margin-bottom:10px;
    }

    </style>

    </head>
    <body>

    <div class="header">
    Dashboard
    </div>

    <div class="grid">

      <a class="card" href="https://wp.pl" target="_blank">
        <div class="icon">📰</div>
        WP
      </a>

      <a class="card" href="https://interia.pl" target="_blank">
        <div class="icon">🌐</div>
        Interia
      </a>

      <a class="card" href="https://onet.pl" target="_blank">
        <div class="icon">🧭</div>
        Onet
      </a>

    </div>

    </body>
    </html>
