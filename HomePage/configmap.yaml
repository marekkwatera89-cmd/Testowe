apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="pl">
    <head>
    <meta charset="UTF-8">
    <title>Strony</title>

    <style>

    body {
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg,#1e3c72,#2a5298);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    h1{
        text-align:center;
        margin-bottom:40px;
    }

    .container{
        text-align:center;
    }

    .tiles{
        display:flex;
        gap:30px;
        justify-content:center;
    }

    .tile{
        width:200px;
        height:150px;
        background:white;
        color:#333;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:24px;
        font-weight:bold;
        text-decoration:none;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.3);
        transition:0.3s;
    }

    .tile:hover{
        transform:scale(1.08);
        box-shadow:0 12px 25px rgba(0,0,0,0.4);
    }

    </style>
    </head>

    <body>

    <div class="container">

        <h1>Moje strony</h1>

        <div class="tiles">

            <a class="tile" href="https://wp.pl" target="_blank">
            WP
            </a>

            <a class="tile" href="https://interia.pl" target="_blank">
            Interia
            </a>

            <a class="tile" href="https://onet.pl" target="_blank">
            Onet
            </a>

        </div>

    </div>

    </body>
    </html>
